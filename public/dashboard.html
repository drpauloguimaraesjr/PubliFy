<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard — PubliFy</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;500;600;700;800&display=swap');

  :root {
    --bg: #0a0a0a; --bg2: #111111; --bg3: #1a1a1a;
    --border: #2a2a2a; --border2: #3a3a3a;
    --gold: #C8922A; --gold2: #E8B04A;
    --white: #f0ece4; --muted: #666; --muted2: #444;
    --green: #4a9e6a; --blue: #4a7eb5; --red: #c24a4a;
    --font-ui: 'Syne', sans-serif;
    --font-mono: 'DM Mono', monospace;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--white); font-family: var(--font-ui); min-height: 100vh; }

  /* TOPBAR */
  #topbar {
    position: sticky; top: 0; z-index: 100;
    height: 48px; background: var(--bg2); border-bottom: 1px solid var(--border);
    display: flex; align-items: center; padding: 0 24px; gap: 16px;
  }
  .logo { font-size: 13px; font-weight: 700; color: var(--gold); letter-spacing: 0.05em; text-transform: uppercase; }
  .sep { width: 1px; height: 20px; background: var(--border); }
  .tb-btn {
    font-family: var(--font-ui); font-size: 11px; font-weight: 600;
    padding: 5px 14px; border-radius: 5px; border: 1px solid var(--border2);
    background: transparent; color: var(--muted); cursor: pointer;
    letter-spacing: 0.04em; text-transform: uppercase; text-decoration: none;
    transition: all 0.15s;
  }
  .tb-btn:hover { border-color: var(--gold); color: var(--gold); }
  .tb-btn.active { border-color: var(--gold); color: var(--gold); }
  .tb-btn.gold { border-color: var(--gold); color: var(--bg); background: var(--gold); font-weight: 700; }
  .tb-btn.gold:hover { background: var(--gold2); }
  .spacer { flex: 1; }
  #count { font-family: var(--font-mono); font-size: 11px; color: var(--muted); }

  /* MAIN GRID */
  #main { max-width: 1400px; margin: 0 auto; padding: 24px; }

  /* FILTER BAR */
  #filters { display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; }
  .filter-btn {
    font-family: var(--font-mono); font-size: 10px; padding: 4px 12px;
    border-radius: 4px; border: 1px solid var(--border); background: transparent;
    color: var(--muted); cursor: pointer; text-transform: uppercase; letter-spacing: 0.06em;
    transition: all 0.15s;
  }
  .filter-btn:hover, .filter-btn.on { border-color: var(--gold); color: var(--gold); }

  /* CAROUSEL GRID */
  #grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 16px; }

  .card {
    background: var(--bg2); border: 1px solid var(--border); border-radius: 10px;
    overflow: hidden; cursor: pointer; transition: border-color 0.15s, transform 0.15s;
  }
  .card:hover { border-color: var(--border2); transform: translateY(-2px); }
  .card-thumb {
    width: 100%; aspect-ratio: 4/5; object-fit: cover;
    border-bottom: 1px solid var(--border); background: var(--bg3);
  }
  .card-thumb.empty { display: flex; align-items: center; justify-content: center; color: var(--muted2); font-size: 32px; }
  .card-body { padding: 12px 14px; }
  .card-topic { font-size: 13px; font-weight: 700; color: var(--white); line-height: 1.3; margin-bottom: 6px;
    display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
  .card-meta { font-family: var(--font-mono); font-size: 10px; color: var(--muted); display: flex; gap: 10px; align-items: center; }
  .badge {
    font-size: 9px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase;
    padding: 2px 8px; border-radius: 3px; display: inline-block;
  }
  .badge.draft { background: rgba(200,146,42,0.15); color: var(--gold); }
  .badge.rendering { background: rgba(74,126,181,0.15); color: var(--blue); }
  .badge.approved { background: rgba(74,158,106,0.15); color: var(--green); }
  .badge.published { background: rgba(74,158,106,0.3); color: var(--green); }

  /* DETAIL PANEL (right side overlay) */
  #detail {
    position: fixed; top: 48px; right: 0; bottom: 0; width: 480px;
    background: var(--bg2); border-left: 1px solid var(--border);
    z-index: 200; transform: translateX(100%); transition: transform 0.25s;
    display: flex; flex-direction: column; overflow: hidden;
  }
  #detail.open { transform: translateX(0); }
  #detail-header {
    padding: 16px 20px; border-bottom: 1px solid var(--border);
    display: flex; justify-content: space-between; align-items: center;
  }
  #detail-title { font-size: 12px; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; color: var(--gold); }
  #detail-close { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 18px; padding: 4px 8px; }
  #detail-close:hover { color: var(--white); }
  #detail-content { flex: 1; overflow-y: auto; padding: 16px 20px; }

  /* SLIDE EDITOR */
  .slide-edit {
    background: var(--bg3); border: 1px solid var(--border); border-radius: 8px;
    margin-bottom: 12px; overflow: hidden;
  }
  .slide-edit-header {
    padding: 8px 12px; display: flex; align-items: center; gap: 8px;
    border-bottom: 1px solid var(--border); font-size: 10px;
  }
  .slide-edit-type { font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: var(--gold); }
  .slide-edit-idx { color: var(--muted); font-family: var(--font-mono); }
  .slide-edit-img { width: 100%; display: block; }
  .slide-edit-fields { padding: 10px 12px; }
  .edit-field { margin-bottom: 8px; }
  .edit-field label {
    display: block; font-size: 9px; font-weight: 600; letter-spacing: 0.08em;
    text-transform: uppercase; color: var(--muted); margin-bottom: 3px;
  }
  .edit-field input, .edit-field textarea {
    width: 100%; font-family: var(--font-mono); font-size: 11px;
    background: var(--bg); border: 1px solid var(--border); border-radius: 4px;
    color: var(--white); padding: 6px 8px; resize: vertical; outline: none;
    transition: border-color 0.15s;
  }
  .edit-field input:focus, .edit-field textarea:focus { border-color: var(--gold); }

  /* ACTION BAR */
  .action-bar { padding: 12px 20px; border-top: 1px solid var(--border); display: flex; gap: 8px; }
  .action-btn {
    flex: 1; font-family: var(--font-ui); font-size: 11px; font-weight: 700;
    letter-spacing: 0.06em; text-transform: uppercase; padding: 8px;
    border-radius: 6px; border: 1px solid var(--border2); background: transparent;
    color: var(--muted); cursor: pointer; transition: all 0.15s;
  }
  .action-btn:hover { border-color: var(--gold); color: var(--gold); }
  .action-btn.primary { border-color: var(--gold); color: var(--bg); background: var(--gold); }
  .action-btn.primary:hover { background: var(--gold2); }
  .action-btn.danger { border-color: var(--red); color: var(--red); }

  /* CAPTION EDITOR */
  .caption-section { margin-top: 16px; }
  .caption-section h3 {
    font-size: 10px; font-weight: 700; letter-spacing: 0.1em;
    text-transform: uppercase; color: var(--muted); margin-bottom: 8px;
  }
  .caption-box {
    font-family: var(--font-mono); font-size: 11px; line-height: 1.6;
    background: var(--bg); border: 1px solid var(--border); border-radius: 6px;
    color: var(--white); padding: 10px; min-height: 120px; width: 100%;
    resize: vertical; outline: none;
  }
  .caption-box:focus { border-color: var(--gold); }
  .hashtags-box {
    font-family: var(--font-mono); font-size: 10px;
    background: var(--bg); border: 1px solid var(--border); border-radius: 6px;
    color: var(--gold2); padding: 8px; margin-top: 8px; width: 100%;
    resize: none; outline: none; min-height: 60px;
  }
  .hashtags-box:focus { border-color: var(--gold); }

  /* LOADING */
  .loading { text-align: center; padding: 40px; color: var(--muted); font-size: 13px; }
  .empty-state { text-align: center; padding: 80px 40px; color: var(--muted2); }
  .empty-state h2 { font-size: 18px; font-weight: 700; color: var(--muted); margin-bottom: 8px; }
  .empty-state p { font-size: 13px; }
</style>
</head>
<body>

<div id="topbar">
  <div class="logo">⬡ PubliFy</div>
  <div class="sep"></div>
  <a class="tb-btn" href="/">Pipeline</a>
  <a class="tb-btn active" href="/dashboard">Dashboard</a>
  <div class="sep"></div>
  <button class="tb-btn gold" onclick="location.href='/'">+ Novo Carrossel</button>
  <div class="spacer"></div>
  <div id="count"></div>
</div>

<div id="main">
  <div id="filters">
    <button class="filter-btn on" onclick="filterBy(null, this)">Todos</button>
    <button class="filter-btn" onclick="filterBy('draft', this)">Draft</button>
    <button class="filter-btn" onclick="filterBy('rendering', this)">Renderizando</button>
    <button class="filter-btn" onclick="filterBy('approved', this)">Aprovado</button>
    <button class="filter-btn" onclick="filterBy('published', this)">Publicado</button>
  </div>
  <div id="grid"></div>
</div>

<div id="detail">
  <div id="detail-header">
    <span id="detail-title">Carrossel</span>
    <button id="detail-close" onclick="closeDetail()">✕</button>
  </div>
  <div id="detail-content"></div>
  <div class="action-bar">
    <button class="action-btn" onclick="saveEdits()">Salvar edições</button>
    <button class="action-btn primary" onclick="reRenderAll()">Re-renderizar</button>
  </div>
</div>

<script>
let allCarousels = [];
let currentFilter = null;
let currentCarousel = null;

async function api(path, opts = {}) {
  const res = await fetch(path, {
    method: opts.method || 'GET',
    headers: opts.body ? { 'Content-Type': 'application/json' } : {},
    body: opts.body ? JSON.stringify(opts.body) : undefined,
  });
  if (!res.ok) throw new Error((await res.json().catch(() => ({}))).error || res.statusText);
  return res.json();
}

function esc(s) {
  return String(s || '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function fmtDate(ts) {
  if (!ts) return '—';
  const d = ts._seconds ? new Date(ts._seconds * 1000) : new Date(ts);
  return d.toLocaleDateString('pt-BR', { day: '2-digit', month: '2-digit', year: '2-digit', hour: '2-digit', minute: '2-digit' });
}

async function loadCarousels() {
  document.getElementById('grid').innerHTML = '<div class="loading">Carregando...</div>';
  try {
    const data = await api('/api/carousel?limit=100');
    allCarousels = data.items || [];
    renderGrid();
  } catch (err) {
    document.getElementById('grid').innerHTML = `<div class="empty-state"><h2>Erro</h2><p>${esc(err.message)}</p></div>`;
  }
}

function renderGrid() {
  const grid = document.getElementById('grid');
  const filtered = currentFilter ? allCarousels.filter(c => c.status === currentFilter) : allCarousels;

  document.getElementById('count').textContent = `${filtered.length} carrossel${filtered.length !== 1 ? 'éis' : ''}`;

  if (!filtered.length) {
    grid.innerHTML = '<div class="empty-state"><h2>Nenhum carrossel</h2><p>Crie um novo no Pipeline.</p></div>';
    return;
  }

  grid.innerHTML = filtered.map(c => {
    const thumbUrl = c.slides?.[0]?.image_url;
    const thumb = thumbUrl
      ? `<img class="card-thumb" src="${esc(thumbUrl)}" alt="Slide 0" loading="lazy">`
      : `<div class="card-thumb empty">◉</div>`;
    return `
      <div class="card" onclick="openDetail('${c.id}')">
        ${thumb}
        <div class="card-body">
          <div class="card-topic">${esc(c.topic || 'Sem título')}</div>
          <div class="card-meta">
            <span class="badge ${c.status || 'draft'}">${c.status || 'draft'}</span>
            <span>${c.slides?.length || 0} slides</span>
            <span>${fmtDate(c.created_at)}</span>
          </div>
        </div>
      </div>`;
  }).join('');
}

function filterBy(status, btn) {
  currentFilter = status;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('on'));
  btn.classList.add('on');
  renderGrid();
}

async function openDetail(id) {
  const c = allCarousels.find(x => x.id === id);
  if (!c) return;
  currentCarousel = c;
  const el = document.getElementById('detail-content');
  document.getElementById('detail-title').textContent = c.topic || 'Carrossel';

  let html = '';

  (c.slides || []).forEach((s, i) => {
    const fields = [];
    if (s.type === 'hook' || s.type === 'body' || s.type === 'data') {
      fields.push({ key: 'eyebrow', label: 'Eyebrow', val: s.eyebrow, tag: 'input' });
      fields.push({ key: 'title', label: 'Título', val: s.title, tag: 'input' });
      if (s.subtitle !== undefined) fields.push({ key: 'subtitle', label: 'Subtítulo', val: s.subtitle, tag: 'input' });
      if (s.body !== undefined && s.body !== null) fields.push({ key: 'body', label: 'Corpo', val: s.body, tag: 'textarea' });
      if (s.reference) fields.push({ key: 'reference', label: 'Referência', val: s.reference, tag: 'input' });
    } else if (s.type === 'cta') {
      fields.push({ key: 'title', label: 'Título', val: s.title, tag: 'input' });
      fields.push({ key: 'cta_medico', label: 'CTA Médico', val: s.cta_medico, tag: 'textarea' });
      fields.push({ key: 'cta_paciente', label: 'CTA Paciente', val: s.cta_paciente, tag: 'textarea' });
    } else if (s.type === 'comparison') {
      fields.push({ key: 'title', label: 'Título', val: s.title, tag: 'input' });
    }

    const imgHtml = s.image_url
      ? `<img class="slide-edit-img" src="${esc(s.image_url)}" alt="Slide ${i}" loading="lazy">`
      : '';

    const fieldsHtml = fields.map(f =>
      `<div class="edit-field">
        <label>${f.label}</label>
        ${f.tag === 'textarea'
          ? `<textarea rows="3" data-slide="${i}" data-key="${f.key}">${esc(f.val || '')}</textarea>`
          : `<input type="text" data-slide="${i}" data-key="${f.key}" value="${esc(f.val || '')}">`
        }
      </div>`
    ).join('');

    html += `
      <div class="slide-edit" id="se-${i}">
        <div class="slide-edit-header">
          <span class="slide-edit-type">${s.type}</span>
          <span class="slide-edit-idx">slide ${i}</span>
        </div>
        ${imgHtml}
        <div class="slide-edit-fields">${fieldsHtml}</div>
      </div>`;
  });

  // Caption + Hashtags
  html += `
    <div class="caption-section">
      <h3>Caption</h3>
      <textarea class="caption-box" id="edit-caption">${esc(c.caption || '')}</textarea>
      <h3 style="margin-top:12px;">Hashtags</h3>
      <textarea class="hashtags-box" id="edit-hashtags">${esc((c.hashtags || []).join(' '))}</textarea>
    </div>`;

  el.innerHTML = html;
  document.getElementById('detail').classList.add('open');
}

function closeDetail() {
  document.getElementById('detail').classList.remove('open');
  currentCarousel = null;
}

async function saveEdits() {
  if (!currentCarousel) return;
  const slides = [...currentCarousel.slides];

  document.querySelectorAll('#detail-content [data-slide]').forEach(el => {
    const idx = parseInt(el.dataset.slide);
    const key = el.dataset.key;
    slides[idx] = { ...slides[idx], [key]: el.value };
  });

  const caption = document.getElementById('edit-caption').value;
  const hashtagsRaw = document.getElementById('edit-hashtags').value;
  const hashtags = hashtagsRaw.split(/[\s,]+/).filter(h => h.startsWith('#') || h.length > 2);

  try {
    const updated = await api('/api/carousel/' + currentCarousel.id, {
      method: 'PATCH',
      body: { slides, caption, hashtags },
    });
    currentCarousel.slides = updated.slides || slides;
    currentCarousel.caption = updated.caption || caption;
    currentCarousel.hashtags = updated.hashtags || hashtags;

    const idx = allCarousels.findIndex(c => c.id === currentCarousel.id);
    if (idx >= 0) allCarousels[idx] = { ...allCarousels[idx], ...currentCarousel };
    renderGrid();
    alert('Edições salvas!');
  } catch (err) {
    alert('Erro ao salvar: ' + err.message);
  }
}

async function reRenderAll() {
  if (!currentCarousel) return;
  if (!confirm('Re-renderizar todos os slides? Isso substitui as imagens atuais.')) return;

  try {
    const data = await api('/api/pipeline/render-upload', {
      method: 'POST',
      body: {
        slides: currentCarousel.slides,
        briefing: { topic: currentCarousel.topic, category: currentCarousel.category },
        caption: currentCarousel.caption,
        hashtags: currentCarousel.hashtags,
        template_config: currentCarousel.template_config,
      },
    });

    // Update with new URLs
    const updated = await api('/api/carousel/' + currentCarousel.id, {
      method: 'PATCH',
      body: {
        slides: currentCarousel.slides.map(s => {
          const match = (data.slide_urls || []).find(u => u.index === s.index);
          return { ...s, image_url: match?.url || s.image_url };
        }),
      },
    });

    currentCarousel = { ...currentCarousel, ...updated };
    const idx = allCarousels.findIndex(c => c.id === currentCarousel.id);
    if (idx >= 0) allCarousels[idx] = currentCarousel;

    openDetail(currentCarousel.id);
    renderGrid();
    alert('Slides re-renderizados com sucesso!');
  } catch (err) {
    alert('Erro ao re-renderizar: ' + err.message);
  }
}

// Painel lateral só fecha clicando no X — sem Escape, sem click-fora.

// Init
loadCarousels();
</script>
</body>
</html>
